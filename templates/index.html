<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="background-overlay"></div>

<div class="main-container">
    <h1 class="main-title">🎬 Movie Recommendation System</h1>
    <p class="subtitle">Smart AI-Powered Movie Discovery</p>

    <form method="POST" class="search-box">
        <input type="text" name="movie" placeholder="Search your favorite movie..." list="movieList" required>

        <datalist id="movieList">
            {% for movie in movies %}
            <option value="{{ movie }}">
            {% endfor %}
        </datalist>

        <select name="genre">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}">{{ genre }}</option>
            {% endfor %}
        </select>

        <button type="submit">Recommend</button>
    </form>

    <div class="movie-container">
        {% for movie in recommendations %}
        
        <a href="{{ url_for('movie_details_page', title=movie.title) }}" 
           style="text-decoration:none; color:inherit;">
           
            <div class="card">
                <img src="{{ url_for('static', filename='posters/' + movie.poster) }}" 
                     alt="{{ movie.title }}">
                     
                <h3>{{ movie.title }}</h3>
                <p class="rating">⭐ {{ movie.rating }}</p>
                <p class="genre">{{ movie.genre }}</p>
            </div>

        </a>

        {% endfor %}
    </div>

</div>

</body>
</html>
